name: Daily Creators API Price Sync

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-price-sync
  cancel-in-progress: false

jobs:
  price-sync:
    name: Sync Prices from PA-API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      # No dependency install needed: scripts/fetch-prices.js uses only
      # Node built-in modules (fs, path, fetch).
      - name: Run price sync
        env:
          CREATORS_CREDENTIAL_ID: ${{ secrets.CREATORS_CREDENTIAL_ID }}
          CREATORS_CREDENTIAL_SECRET: ${{ secrets.CREATORS_CREDENTIAL_SECRET }}
          PAAPI_PARTNER_TAG: ${{ secrets.PAAPI_PARTNER_TAG }}
        run: node scripts/fetch-prices.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/products-data.js price-sync-report.json
          if git diff --cached --quiet; then
            echo "No price changes — nothing to commit."
          else
            git commit -m "chore: daily Creators API price sync"
            git push
          fi
