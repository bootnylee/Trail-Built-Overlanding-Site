name: Monthly Report

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Report month (YYYY-MM). Leave blank for previous month.'
        required: false
        default: ''

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install python-dateutil requests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SEO audit
        run: node scripts/seo-audit.mjs || true

      - name: Run product validator
        run: python3 scripts/validate-products.py || true

      - name: Generate monthly report (Python)
        env:
          EMAILOCTOPUS_API_KEY: ${{ secrets.EMAILOCTOPUS_API_KEY }}
          EMAILOCTOPUS_LIST_ID: ${{ secrets.EMAILOCTOPUS_LIST_ID }}
          EMAILOCTOPUS_AUTOMATION_ID: ${{ secrets.EMAILOCTOPUS_AUTOMATION_ID }}
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python3 scripts/monthly_report.py --month "${{ github.event.inputs.month }}"
          else
            python3 scripts/monthly_report.py
          fi

      - name: Commit report to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          if git diff --staged --quiet; then
            echo "No new report to commit"
          else
            MONTH=$(date -d "$(date +%Y-%m-01) -1 month" +%Y-%m 2>/dev/null || date -v-1m +%Y-%m)
            git commit -m "chore: add monthly report for ${MONTH}"
            git push
            echo "Report committed and pushed"
          fi
