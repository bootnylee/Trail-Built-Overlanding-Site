# TrailBuiltOverland.com — Netlify Configuration
# Modeled on SilkierStrands.com best practices

[build]
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# ── Security headers (all pages) ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options             = "DENY"
    X-XSS-Protection            = "1; mode=block"
    X-Content-Type-Options      = "nosniff"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Permissions-Policy          = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets aggressively ─────────────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache article and category pages (1 hour, revalidate in background) ───────
[[headers]]
  for = "/articles/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/categories/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# ── Cache sitemap for 1 day ───────────────────────────────────────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Cache robots.txt for 1 week ───────────────────────────────────────────────
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── Canonical domain enforcement: www → non-www (301) ────────────────────────
# Netlify handles http→https automatically via the "Force HTTPS" setting in
# the Netlify dashboard (Site settings → Domain management → HTTPS).
# This rule redirects www.trailbuiltoverland.com → trailbuiltoverland.com.
[[redirects]]
  from   = "https://www.trailbuiltoverland.com/*"
  to     = "https://trailbuiltoverland.com/:splat"
  status = 301
  force  = true

# ── Affiliate link redirect shortener ────────────────────────────────────────
# Clean URLs: /go/B07SJHVQTJ → Amazon product page with affiliate tag
# Usage in HTML: <a href="/go/B07SJHVQTJ">View on Amazon</a>
[[redirects]]
  from   = "/go/:asin"
  to     = "https://www.amazon.com/dp/:asin?tag=trailbuiltove-20"
  status = 302

# ── Serve sitemap.xml directly ────────────────────────────────────────────────
[[redirects]]
  from   = "/sitemap.xml"
  to     = "/sitemap.xml"
  status = 200
